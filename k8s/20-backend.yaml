# Backend API (Flask management.py) — port 5001.
# Ganti image sesuai registry Anda (lihat k8s/README.md).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lms-praktikum
  labels: { app: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: hsg.ocir.io/axyfpuh4ahcf/praktikum-backend:latest
          ports:
            - containerPort: 5001
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef: { name: supabase-credentials, key: SUPABASE_URL }
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef: { name: supabase-credentials, key: SUPABASE_SERVICE_ROLE_KEY }
            - name: ORCHESTRATOR_URL
              value: "http://orchestrator:4000"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: FLASK_APP
              value: "management.py"
            - name: FLASK_RUN_HOST
              value: "0.0.0.0"
            - name: FLASK_RUN_PORT
              value: "5001"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TZ
              value: "Asia/Jakarta"
            - name: MAX_SCHEDULER_CONCURRENT
              value: "5"
            - name: LABS_RATE_LIMIT_SECONDS
              value: "10"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 5001 }
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /health, port: 5001 }
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: lms-praktikum
spec:
  selector: { app: backend }
  ports:
    - port: 5001
      targetPort: 5001
