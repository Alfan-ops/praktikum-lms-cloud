# Template Secret untuk kredensial Supabase.
# JANGAN commit versi berisi nilai asli. Buat manual di cluster dengan:
#
#   kubectl -n lms-praktikum create secret generic supabase-credentials \
#     --from-literal=SUPABASE_URL='https://xxxx.supabase.co' \
#     --from-literal=SUPABASE_SERVICE_ROLE_KEY='isi_service_role_key'
#
# File ini hanya contoh struktur (nilai placeholder base64 dari kata "changeme").
apiVersion: v1
kind: Secret
metadata:
  name: supabase-credentials
  namespace: lms-praktikum
type: Opaque
stringData:
  SUPABASE_URL: "https://CHANGEME.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: "CHANGEME"
