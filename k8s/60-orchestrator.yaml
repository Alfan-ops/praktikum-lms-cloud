# Orchestrator versi Kubernetes (app_k8s.py).
# Membuat Deployment+Service+Ingress per mahasiswa via Kubernetes API.
# Butuh RBAC (61-orchestrator-rbac.yaml) & imagePullSecret OCIR (dibuat di Fase 2).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: lms-praktikum
  labels: { app: orchestrator }
spec:
  replicas: 1   # WAJIB 1: state semaphore/antrian autoscaler di memori 1 proses
  selector:
    matchLabels: { app: orchestrator }
  template:
    metadata:
      labels: { app: orchestrator }
    spec:
      serviceAccountName: orchestrator
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: orchestrator
          image: hsg.ocir.io/axyfpuh4ahcf/praktikum-orchestrator-k8s:latest
          ports:
            - containerPort: 4000
          env:
            - name: LAB_NAMESPACE
              value: "lms-praktikum"
            - name: JUPYTER_IMAGE
              value: "hsg.ocir.io/axyfpuh4ahcf/ml-lab-single-user:latest"
            - name: IMAGE_PULL_SECRET
              value: "ocir-secret"
            - name: INGRESS_CLASS
              value: "nginx"
            # ACCESSIBLE_HOST = IP publik Ingress Controller (isi setelah LB dibuat, Fase 2)
            - name: ACCESSIBLE_HOST
              value: "CHANGEME_INGRESS_IP"
            - name: MAX_CONCURRENT_DEPLOYS
              value: "10"
            - name: DEPLOY_QUEUE_MAX
              value: "200"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: lms-praktikum
spec:
  selector: { app: orchestrator }
  ports:
    - port: 4000
      targetPort: 4000
