# Prometheus — monitoring. Config via ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: lms-praktikum
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'backend'
        static_configs:
          - targets: ['backend:5001']
      # Metrik per-container dari orchestrator (pengganti cAdvisor).
      # Akan aktif setelah orchestrator di-rewrite ke K8s API (Fase 3).
      - job_name: 'container_metrics'
        metrics_path: /metrics/containers
        static_configs:
          - targets: ['orchestrator:4000']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: lms-praktikum
  labels: { app: prometheus }
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      containers:
        - name: prometheus
          image: docker.io/prom/prometheus:latest
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "1Gi" }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: lms-praktikum
spec:
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
