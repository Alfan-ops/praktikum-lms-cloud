# RBAC untuk orchestrator: izin membuat/menghapus Deployment, Service, Ingress,
# serta membaca Pod & metrik pod di namespace lms-praktikum.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: lms-praktikum
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-role
  namespace: lms-praktikum
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "delete", "watch"]
  - apiGroups: [""]
    resources: ["services", "pods"]
    verbs: ["get", "list", "create", "delete", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "delete", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-rolebinding
  namespace: lms-praktikum
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: lms-praktikum
roleRef:
  kind: Role
  name: orchestrator-role
  apiGroup: rbac.authorization.k8s.io
