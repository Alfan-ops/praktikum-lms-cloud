global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:5001']

  # Metrik per-container praktikum (pengganti cAdvisor yang gagal di WSL2).
  # Orchestrator menghitung CPU/memori tiap container via Docker API.
  - job_name: 'container_metrics'
    metrics_path: /metrics/containers
    static_configs:
      - targets: ['orchestrator:4000']

  # cAdvisor dipertahankan (opsional) namun sering gagal di lingkungan WSL2.
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
